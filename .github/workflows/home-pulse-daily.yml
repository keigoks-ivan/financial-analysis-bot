name: Daily Home Pulse

# 首頁「市場脈動」（docs/home/pulse.json）— 純機械、零 LLM。
# 讀 monitor 機械層（latest.json）＋ rotation radar（radar.json，cross_asset 120d），
# 產事實 bullet ＋ 象限跨界轉折提醒（scripts/build_home_pulse.py）。
#
# 事件驅動：monitor（23:30 UTC Mon-Fri）或 radar（22:40 UTC Tue-Sat）任一 workflow
# 跑完就重生一次，讓 pulse 永遠跟著最新資料層。build_home_pulse.py 是 zero-churn
# 寫入——資料沒動就空 diff、不 commit，故重複觸發是冪等的。cron 為 fallback。
on:
  workflow_run:
    workflows: ["Daily Market Monitor", "Daily Asset Rotation Radar (RRG)"]
    types: [completed]
  schedule:
    - cron: "0 1 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: home-pulse-daily
  cancel-in-progress: false

jobs:
  pulse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build home pulse
        run: python scripts/build_home_pulse.py

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/home/pulse.json | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/home/pulse.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "home-pulse: 每日市場脈動 ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
