name: Deploy Pages

# 2026-07-05 從 legacy「分支部署」遷移至 Actions 部署管線。
# 動機：legacy 管線單日六次 "Deployment failed, try again later"（syncing_files
# 階段的服務端瞬時錯誤）＋一次漏觸發。Actions 管線更穩定，且 concurrency 讓
# 連續快速 push 自動收斂到最新版（舊部署取消，不再互相踩踏）。
# 自訂網域設定在 Pages settings，不受此遷移影響；docs/CNAME 保留無害。

# Deploy triggers — four layers so the live site can never silently lag behind
# committed docs/ (see 2026-07-14 monitor incident):
#   1. push docs/**        — external-repo crons push via PAT → instant deploy.
#   2. workflow_run        — same-repo crons that commit via github-actions[bot];
#                            a GITHUB_TOKEN push does NOT retrigger `push`
#                            workflows (GitHub anti-recursion), so those bot
#                            commits would otherwise never deploy on their own.
#                            workflow_run is exempt from that restriction and
#                            fires the moment the cron completes (~07:35 Taipei
#                            for the 23:30 UTC monitor). Weekly Decision Engine
#                            added 2026-07-20: its docs/engine/ refresh sat
#                            un-deployed for 4.5h waiting on layer 3, and an
#                            Actions runner outage that night swallowed the
#                            scheduled sweep entirely — the site served
#                            week-old engine data for ~7h. Layer 3 alone is not
#                            enough for weekly crons whose output the cockpit
#                            reads directly. W52 adaptive vol-target added
#                            2026-07-21: it commits docs/long-track-w52-adaptive/
#                            TWICE per trading day (TW + US close) and drives the
#                            LIVE sleeve's email alerts, so an up-to-6h deploy lag
#                            meant the live-system page (target exposures the user
#                            acts on) trailed its own committed data every day.
#   3. schedule            — name-independent safety net every 6h: catches ANY
#                            other bot-committed docs/ change (screeners /
#                            fundamentals / weekly crons) without having to
#                            enumerate every workflow here. Future crons are
#                            covered automatically, but with up to 6h of lag.
#   4. workflow_dispatch   — manual redeploy.
on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_run:
    workflows:
      - "Daily Market Monitor"
      - "Daily Asset Rotation Radar (RRG)"
      - "Weekly Decision Engine"
      - "Update W52 × Adaptive Vol-Target Signal (US+TW)"
    types: [completed]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Always deploy the latest main HEAD. Under workflow_run the default
          # checkout ref is the triggering run's START sha (i.e. BEFORE the cron's
          # data commit), which would deploy stale docs — pin main explicitly.
          ref: main

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
