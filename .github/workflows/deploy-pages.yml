name: Deploy Pages

# 2026-07-05 從 legacy「分支部署」遷移至 Actions 部署管線。
# 動機：legacy 管線單日六次 "Deployment failed, try again later"（syncing_files
# 階段的服務端瞬時錯誤）＋一次漏觸發。Actions 管線更穩定，且 concurrency 讓
# 連續快速 push 自動收斂到最新版（舊部署取消，不再互相踩踏）。
# 自訂網域設定在 Pages settings，不受此遷移影響；docs/CNAME 保留無害。

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
