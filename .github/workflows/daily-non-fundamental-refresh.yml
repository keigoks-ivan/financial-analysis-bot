name: Daily Non-Fundamental Refresh

# 非基本面（價格驅動）資料每日刷新。
# 整合原先：daily-alpha-momentum.yml + daily-quality-entry.yml + weekly-dd-screener.yml
#
# 跑 Tue-Sat 09:00 Taipei = Tue-Sat 01:00 UTC：
#   - 美股 Mon-Fri 21:00 UTC 收盤 → 01:00 UTC 跑時資料已 settle 4hr
#   - 台股 Mon-Fri 05:30 UTC 收盤 → 同樣已 settle
#   - 週日 / 週一 (台灣) 跳過 — 沒新行情
#
# 跑的順序：
#   1. build_dd_screener.py                       → latest.json (MA + timing 重整；
#                                                    fundamentals 重讀但無變更則 no-op diff)
#   3. build_quality_entry.py                     → entry sub-score 跟著 timing 漂移
#   8. state_machine/study/write_daily_close.py   → 態④研究寬表 forward 切片
#                                                    docs/.../study/closes_daily/{date}.json
#                                                    (~4.6KB/日；本機 run_study.py --rebuild 併寬表)
#   9. sop_funnel/build.py + alert.py             → 板機掃描 + email
#
# 涵蓋頁面：
#   - /dd-screener/                  (client-side fetch latest.json)
#   - /dd-screener/quality-entry.html
#   - /dd-screener/sop-funnel.html
#
# 2026-07-07 選股頁面整理（見 notes/site-internal/root/_proposal_stock_pages_cleanup_20260707.md）：
# 原 Step 2（alpha momentum）、Step 4-7（bottom-out / breakout / earnings-acceleration /
# entry-state）已隨頁面封存移除——四頁 JSON 零下游消費者，職能由 sop-funnel 板機 /
# cyclical-track / GRP 上修閘接手；snapshots 凍結保留。step 編號保留原號不重排。

on:
  schedule:
    - cron: "0 1 * * 2-6"  # Tue-Sat 01:00 UTC = Tue-Sat 09:00 Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy lxml

      - name: Step 1 — DD Screener latest.json (MA + timing refresh)
        run: python scripts/build_dd_screener.py

      - name: Step 3 — Quality-Entry screener
        run: python scripts/build_quality_entry.py
        continue-on-error: true

      - name: Step 8 — Study daily closes slice (態④研究寬表 forward 切片)
        run: python scripts/state_machine/study/write_daily_close.py
        continue-on-error: true

      - name: Step 9 — Pure MA SOP 漏斗（訊號掃描 + 帳本 + 記分板頁）
        run: python scripts/sop_funnel/build.py
        continue-on-error: true

      - name: Step 9b — SOP 漏斗板機 alert 檔
        run: python scripts/sop_funnel/alert.py
        continue-on-error: true

      - name: Read SOP funnel alert
        id: sop_alert
        run: |
          if [ -f sop_funnel_alert.txt ]; then
            echo "triggered=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat sop_funnel_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email SOP funnel trigger
        if: steps.sop_alert.outputs.triggered == 'true'
        uses: dawidd6/action-send-mail@v3
        continue-on-error: true
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "🎯 SOP 漏斗板機 — 今日有通過全部 veto 的進場訊號"
          to: keigoks@gmail.com
          from: InvestMQuest Signals <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.sop_alert.outputs.body }}

            —
            InvestMQuest · 每日收盤後自動掃描

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly_cache/ \
                  docs/dd-screener/latest.json \
                  docs/dd-screener/quality-entry.html \
                  docs/dd-screener/quality-entry.json \
                  docs/dd-screener/quality-entry-snapshots/ \
                  docs/dd-screener/state-machine/data/study/closes_daily/ \
                  docs/dd-screener/sop-funnel.html \
                  docs/dd-screener/sop-funnel/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
            git commit -m "data: Daily non-fundamental refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3 4 5 6; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase --autostash origin main || { echo "Rebase failed"; exit 1; }
              sleep $((RANDOM % 20 + 5))
            done
            echo "Push failed after 6 attempts"
            exit 1
          fi
