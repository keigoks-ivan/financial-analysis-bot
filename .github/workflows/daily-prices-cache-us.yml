name: Daily Prices Cache · US

# Builds docs/cache/prices-us.json — Tue–Sat 09:30 TPE.
# Mirrors docs/screener/latest.json (S&P 500 + NQ100) + small yfinance fallback
# for ~30 EU/JP DD tickers not in screener universe.
#
# Runs 30 min after daily-screener-us.yml (22:00 UTC = 06:00 TPE next day)
# to ensure mirror picks up fresh data.

on:
  # 2026-07-18 已整合進 daily-us-close.yml（時段帶 A），排程停用；保留手動觸發。
  # 原排程：cron "30 22 * * 1-5"（22:30 UTC Mon–Fri = 06:30 TPE Tue–Sat）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cache-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Build US prices cache
        run: python scripts/build_prices_cache.py --region us

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cache/prices-us.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: US prices cache refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3 4 5 6; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase --autostash origin main || { echo "Rebase failed"; exit 1; }
              sleep $((RANDOM % 20 + 5))
            done
            echo "Push failed after 6 attempts"
            exit 1
          fi
