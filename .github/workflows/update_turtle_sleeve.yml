name: Update Commodity Sleeve Signal

on:
  schedule:
    # Weekdays 21:30 UTC (US market close 16:00 ET + 1.5h buffer)
    # = next-day 05:30 Taiwan time. The CMDTY2 turtle sleeve is a DAILY
    # timeframe system (55/20 breakout on GLD/USO), so it must be checked
    # every trading day — unlike the weekly STX50 page.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Manual trigger anytime
    inputs:
      test_email:
        description: 'Send a test email even without sleeve events'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run commodity sleeve update
        run: python scripts/update_turtle_sleeve.py

      - name: Read change alert
        id: alert
        run: |
          if [ -f turtle_sleeve_alert.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat turtle_sleeve_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email sleeve event
        if: steps.alert.outputs.changed == 'true' || inputs.test_email == true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "🐢 商品 Sleeve 訊號 ${{ steps.alert.outputs.changed == 'true' && '' || '(測試信)' }}"
          to: keigoks@gmail.com
          from: InvestMQuest Signals <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.alert.outputs.changed == 'true' && steps.alert.outputs.body || '這是測試信 — 商品 sleeve email 管線正常。今日無 sleeve 事件。' }}

            —
            InvestMQuest · 商品 Sleeve (OOS 並行追蹤) · 每個交易日美股收盤後自動檢查
            退訂: 移除 repo secret MAIL_APP_PASSWORD 或編輯 update_turtle_sleeve.yml

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/turtle-sleeve/index.html docs/turtle-sleeve/state.json
          git diff --staged --quiet || git commit -m "Auto update commodity sleeve: $(date -u '+%Y-%m-%d')"
          git push
