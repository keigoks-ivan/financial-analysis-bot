name: Fetch Portfolio Prices

# 每週六 UTC 00:30 = 週六 08:30 Asia/Taipei（在 CCR weekly PM 09:00 Taipei 前 30 分鐘）
# 取 v11+ DD 中所有 ticker + watchlist + benchmark 的現價 + 300 日歷史，commit 回 repo
# CCR 遠端環境無法直接打外部 API，透過這個 workflow 把資料推進 repo

on:
  schedule:
    - cron: '30 0 * * 6'
  workflow_dispatch:  # 手動觸發

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet yfinance pandas

      - name: Fetch prices and history
        run: python scripts/fetch_prices.py

      - name: Commit updated portfolio data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio/prices.json portfolio/history.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update portfolio prices $(date -u +%Y-%m-%d)"
            git push
          fi
