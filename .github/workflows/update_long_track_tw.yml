name: Update Long Track TW 2330/0050 Signal

on:
  schedule:
    # Every Saturday 01:30 UTC = Saturday 09:30 Taiwan time.
    # Taiwan market closes Fri 13:30 (05:30 UTC); this runs ~28h later so
    # yfinance .TW end-of-day data is fully settled. E3 signals are weekly
    # (W40/W52) + monthly (TSMOM month-end), so the Friday close is the only
    # meaningful update — checking once over the weekend is sufficient.
    - cron: '30 1 * * 6'
  workflow_dispatch:  # Manual trigger anytime
    inputs:
      test_email:
        description: 'Send a test email even without signal changes'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run long-track TW 2330/0050 update
        run: python scripts/update_long_track_tw.py

      - name: Read change alert
        id: alert
        run: |
          if [ -f lt_tw_alert.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat lt_tw_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/long-track-tw/index.html docs/long-track-tw/state.json
          git diff --staged --quiet || git commit -m "Auto update long-track TW 2330/0050: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase --autostash origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
