name: Weekly DD Screener

on:
  schedule:
    # Sundays 18:00 UTC — runs after Saturday's weekly-quarterly-us so QGM
    # latest.json has the freshest hard_filter_details before we join.
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Build DD Screener latest.json
        run: python scripts/build_dd_screener.py

      - name: Rebuild Quality-Entry screener (cascades from latest.json)
        run: python scripts/build_quality_entry.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dd-screener/latest.json \
                  docs/dd-screener/quality-entry.html \
                  docs/dd-screener/quality-entry.json \
                  docs/dd-screener/quality-entry-snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: DD Screener weekly rebuild ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
          fi
