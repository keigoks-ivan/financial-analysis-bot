name: Update vol-target Leverage Overlay

on:
  # 2026-07-18 已整合進 daily-us-close.yml（時段帶 A），排程停用；保留手動觸發。
  # 原排程：cron '30 21 * * 1-5'（Weekdays 21:30 UTC；vol-target 日線 RV）
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run vol-target leverage overlay update
        run: python scripts/update_leverage_overlay.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/long-track-smh/leverage/index.html docs/long-track-smh/leverage/state.json
          git diff --staged --quiet || git commit -m "Auto update vol-target leverage overlay: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase --autostash origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
