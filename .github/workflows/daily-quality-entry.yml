name: Daily Quality-Entry refresh

on:
  schedule:
    # 09:00 Taipei (= 01:00 UTC), Tue-Sat
    # Tue/Wed/Thu/Fri 早上：抓昨晚美股收盤 (Mon-Thu close at ~21:00 UTC same day)
    # Sat 早上：抓週五美股收盤 + 週五台股收盤
    # Mon (台灣) / Sun (台灣) 跳過 — 週末沒新行情
    - cron: "0 1 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Rebuild DD Screener latest.json (refresh MA + timing)
        run: python scripts/build_dd_screener.py

      - name: Rebuild Quality-Entry screener
        run: python scripts/build_quality_entry.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dd-screener/latest.json \
                  docs/dd-screener/quality-entry.html \
                  docs/dd-screener/quality-entry.json \
                  docs/dd-screener/quality-entry-snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
            git commit -m "data: Quality-Entry daily refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
          fi
