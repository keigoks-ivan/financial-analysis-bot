name: Pages Auto-Heal

# v2（2026-07-05）：站點已遷移至 Actions 部署管線（deploy-pages.yml），
# 本工作流簡化為「最新 Deploy Pages run 失敗 → 自動 rerun」的兜底。
# （legacy 時代的 POST /pages/builds 已不適用；漏觸發問題屬 legacy 管線特有，
#  Actions push 觸發可靠，不再檢查。）

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: pages-auto-heal
  cancel-in-progress: true

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Rerun latest Deploy Pages run if it failed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          R=$(gh run list --repo "$REPO" --workflow deploy-pages.yml --branch main --limit 1 \
              --json databaseId,status,conclusion \
              --jq '.[0] | "\(.databaseId) \(.status) \(.conclusion)"' || true)
          if [ -z "$R" ]; then echo "no deploy runs yet"; exit 0; fi
          ID=$(echo "$R" | awk '{print $1}')
          ST=$(echo "$R" | awk '{print $2}')
          CC=$(echo "$R" | awk '{print $3}')
          echo "latest deploy run: $ID $ST $CC"
          if [ "$ST" = "completed" ] && [ "$CC" = "failure" ]; then
            echo "→ rerunning failed deploy"
            gh run rerun "$ID" --failed --repo "$REPO"
          else
            echo "→ nothing to heal"
          fi
