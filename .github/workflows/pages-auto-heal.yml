name: Pages Auto-Heal

# GitHub Pages 「從分支部署」管線的偶發故障自癒（2026-07-05 單日五次 flaky 後上線）：
#   病 1：deploy 在 syncing_files 階段回 "Deployment failed, try again later"（build errored）
#   病 2：push 到 main 後 Pages 根本沒觸發 build（latest build 落後 HEAD）
# 兩者都用「請求重建最新 main」（POST /pages/builds）治療，最多延遲 15 分鐘自癒。

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  pages: write
  contents: read

concurrency:
  group: pages-auto-heal
  cancel-in-progress: true

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check latest Pages build and heal if needed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          B=$(gh api "repos/$REPO/pages/builds/latest")
          STATUS=$(echo "$B" | jq -r .status)
          BUILT_SHA=$(echo "$B" | jq -r .commit)
          echo "latest pages build: $STATUS @ ${BUILT_SHA:0:8}"

          if [ "$STATUS" = "errored" ]; then
            echo "→ build errored; requesting rebuild"
            gh api -X POST "repos/$REPO/pages/builds"
            exit 0
          fi

          # 正在跑就不插手
          if [ "$STATUS" = "building" ] || [ "$STATUS" = "queued" ]; then
            echo "→ build in progress; nothing to do"
            exit 0
          fi

          HEAD_SHA=$(gh api "repos/$REPO/commits/main" --jq .sha)
          if [ "$BUILT_SHA" = "$HEAD_SHA" ]; then
            echo "→ up to date"
            exit 0
          fi

          # HEAD 比已部署新：給正常 build 10 分鐘窗口，超過視為漏觸發
          HEAD_TIME=$(gh api "repos/$REPO/commits/main" --jq .commit.committer.date)
          AGE=$(( $(date -u +%s) - $(date -u -d "$HEAD_TIME" +%s) ))
          if [ "$AGE" -gt 600 ]; then
            echo "→ HEAD ${HEAD_SHA:0:8} unbuilt for ${AGE}s; requesting rebuild"
            gh api -X POST "repos/$REPO/pages/builds"
          else
            echo "→ HEAD is ${AGE}s old; within normal build window, waiting"
          fi
