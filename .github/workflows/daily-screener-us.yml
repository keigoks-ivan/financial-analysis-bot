name: Daily RS+VCP Screener

on:
  schedule:
    # Mon-Fri 22:00 UTC = Tue-Sat 06:00 Taiwan time (after US Mon-Fri close)
    # If US market holiday, yfinance returns last trading day's data automatically
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy requests lxml

      - name: Run screener
        id: screener
        run: python scripts/screener.py --quick

      - name: Run market state engine
        run: python scripts/market_state.py

      - name: Run RS peaks aggregator
        run: python scripts/rs_peaks.py

      - name: Commit and push if changed
        if: steps.screener.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screener/
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: screener update ${DATE}

          Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
