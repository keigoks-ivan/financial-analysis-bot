name: Daily US Fundamentals

on:
  schedule:
    # Mon-Fri 22:45 UTC = 45 min after daily-screener-us.yml; uses its latest.json top-N.
    # Staggered 15 min after daily-prices-cache-us.yml (22:30) to avoid concurrent-push race.
    - cron: "45 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-us-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run US fundamentals fetcher
        run: python scripts/fundamentals_us.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screener/fundamentals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: US fundamentals refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            done
            echo "Push failed after 3 attempts"
            exit 1
          fi
