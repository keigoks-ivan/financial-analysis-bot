name: Weekly Fundamental Refresh

# 基本面層 + 標的清單每週日跑一次。
# 整合原先：weekly-alpha-jensen.yml (Sun 19:00 UTC)
#
# 跑 Sun 18:00 UTC = Mon 02:00 Taipei：
#   - dd_alpha_ranker.py --layers fundamental → Angle 1 多因子 + 3 GARP + 4 護城河
#   - dd_alpha_ranker.py --layers jensen      → Angle 6 Jensen α (5Y weekly OLS vs SPY)
#   - scan_pre_id.py                          → 形狀掃描（爆發形狀 × 前瞻確認 × 覆蓋）
#   - generate_targets.py                     → 跨層最強訊號標的清單 targets.html
#
# 為何週度而非每日：
#   - 基本面層讀 dd-meta 內的 moat_score / quality_score / fpe_fy2 / pct_5y
#     等靜態數字，DD/DCA 不重寫就不會變
#   - Jensen 用 5Y weekly closes，day-over-day 幾乎不會變動
#   - 形狀掃描過濾的是季營收成長（季度數字，不會日內變）+ 前瞻預估（月度 Excel），
#     天天跑只是多撞 yfinance rate-limit；週度既符合定位又省額度
#   - 每日跑只是反覆寫出同樣 JSON，浪費 ~5min Actions 時間
#
# Fail-safe：scan_pre_id / generate_targets 皆 continue-on-error，yfinance 抽風時
#   scan 失敗不 abort job，pre_id_scan.json 維持上週版本（不寫壞），標的頁用
#   「上週形狀 + 本週裁決」優雅降級重生。
#
# 即時刷新仍由 update_dd_index.py 在 DD/DCA 寫入時負責 cascade。
# 非基本面（價格驅動）每日由 daily-non-fundamental-refresh.yml 處理。

on:
  schedule:
    - cron: "0 18 * * 0"  # Sun 18:00 UTC = Mon 02:00 Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.54" pandas numpy

      - name: Alpha-Rank fundamental layer (Angle 1 多因子 + 3 GARP + 4 護城河)
        run: python scripts/dd_alpha_ranker.py --layers fundamental

      - name: Alpha-Rank jensen layer (Angle 6 Jensen α)
        run: python scripts/dd_alpha_ranker.py --layers jensen
        continue-on-error: true

      # ── 標的產生器鏈（形狀掃描 → 標的頁）─────────────────────────────
      # scan_pre_id.py 抓 ~272 檔 yfinance .info + 前瞻預估，重且會撞 rate-limit，
      # 所以掛週度而非每日。continue-on-error：yfinance 抽風時 scan 失敗不 abort
      # 整個 job；scan 失敗時 pre_id_scan.json 維持上週版本（不寫壞），
      # generate_targets.py 照樣用「上週形狀 + 本週裁決」重生，優雅降級不斷鏈。
      - name: Shape scan (爆發形狀 × 前瞻確認 × 覆蓋標籤)
        run: python scripts/scan_pre_id.py
        continue-on-error: true

      # 純本地 JSON 合併、無網路，失敗率極低；仍加 continue-on-error 保證絕不擋 commit。
      - name: Generate targets page (跨層最強訊號)
        run: python scripts/generate_targets.py
        continue-on-error: true

      # ── 衛星·循環軌（循環底部 × 上修動能提名層）───────────────────────────
      # 純本地：讀 latest.json + data/weekly_cache 週線，無網路。continue-on-error
      # 比照 scan/targets：失敗不 abort job，cyclical-track.json 維持上週版本
      # （build 只在成功結尾寫檔，不會寫壞）。
      - name: Cyclical track (循環底部 × 上修動能)
        run: python scripts/build_cyclical_track.py
        continue-on-error: true

      # ── Pipeline 漏斗總覽頁（整條漏斗的活數字單頁）────────────────────────
      # 純本地：讀 latest.json + cyclical-track.json + sop-funnel latest/ledger
      # + pre_id_scan.json + data/weekly_cache 週線，無網路。掛在循環軌之後，
      # 消費上游剛產的 JSON。continue-on-error 比照 fail-safe 慣例：失敗不 abort
      # job，pipeline.html 維持上週版本（build 只在成功結尾寫檔）。
      - name: Pipeline overview page (漏斗總覽)
        run: python scripts/build_pipeline_page.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dd-screener/alpha-rank.html \
                  docs/dd-screener/alpha-rank.json \
                  docs/dd-screener/alpha-rank-state/ \
                  docs/dd-screener/alpha-rank-snapshots/ \
                  docs/dd-screener/pre_id_scan.json \
                  docs/dd-screener/targets.html \
                  docs/dd-screener/cyclical-track.html \
                  docs/dd-screener/cyclical-track.json \
                  docs/dd-screener/cyclical-track-snapshots/ \
                  docs/dd-screener/pipeline.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
            git commit -m "data: Weekly fundamental refresh + 標的清單 ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3 4 5 6; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
              sleep $((RANDOM % 20 + 5))
            done
            echo "Push failed after 6 attempts"
            exit 1
          fi
