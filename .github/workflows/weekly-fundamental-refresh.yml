name: Weekly Fundamental Refresh

# 基本面層每週日跑一次。
#
# 跑 Sun 18:00 UTC = Mon 02:00 Taipei：
#   - scan_pre_id.py           → 形狀掃描（爆發形狀 × 前瞻確認 × 覆蓋）
#   - build_cyclical_track.py  → 衛星·循環軌
#   - build_pipeline_page.py   → 漏斗總覽頁
#
# 為何週度而非每日：
#   - 形狀掃描過濾的是季營收成長（季度數字，不會日內變）+ 前瞻預估（月度 Excel），
#     天天跑只是多撞 yfinance rate-limit；週度既符合定位又省額度
#   - 每日跑只是反覆寫出同樣 JSON，浪費 ~5min Actions 時間
#
# 2026-07-07 選股頁面整理（見 notes/site-internal/root/_proposal_stock_pages_cleanup_20260707.md）：
# 原 dd_alpha_ranker fundamental/jensen 兩層（頁面已封存、JSON 零下游）與
# generate_targets.py（targets.html 封存，職能併入 pipeline 潛力榜與 /engine/ 雷達）
# 已移除；scan_pre_id.py 保留（pipeline 頁的形狀輸入）。
#
# Fail-safe：scan_pre_id continue-on-error，yfinance 抽風時 scan 失敗不 abort job，
#   pre_id_scan.json 維持上週版本（不寫壞），pipeline 頁優雅降級重生。
#
# 即時刷新仍由 update_dd_index.py 在 DD/DCA 寫入時負責 cascade。
# 非基本面（價格驅動）每日由 daily-non-fundamental-refresh.yml 處理。

on:
  schedule:
    - cron: "0 18 * * 0"  # Sun 18:00 UTC = Mon 02:00 Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.54" pandas numpy

      # ── 形狀掃描 ─────────────────────────────────────────────────────
      # scan_pre_id.py 抓 ~272 檔 yfinance .info + 前瞻預估，重且會撞 rate-limit，
      # 所以掛週度而非每日。continue-on-error：yfinance 抽風時 scan 失敗不 abort
      # 整個 job；scan 失敗時 pre_id_scan.json 維持上週版本（不寫壞）。
      - name: Shape scan (爆發形狀 × 前瞻確認 × 覆蓋標籤)
        run: python scripts/scan_pre_id.py
        continue-on-error: true

      # ── 衛星·循環軌（循環底部 × 上修動能提名層）───────────────────────────
      # 純本地：讀 latest.json + data/weekly_cache 週線，無網路。continue-on-error
      # 比照 scan/targets：失敗不 abort job，cyclical-track.json 維持上週版本
      # （build 只在成功結尾寫檔，不會寫壞）。
      - name: Cyclical track (循環底部 × 上修動能)
        run: python scripts/build_cyclical_track.py
        continue-on-error: true

      # ── Pipeline 漏斗總覽頁（整條漏斗的活數字單頁）────────────────────────
      # 純本地：讀 latest.json + cyclical-track.json + sop-funnel latest/ledger
      # + pre_id_scan.json + data/weekly_cache 週線，無網路。掛在循環軌之後，
      # 消費上游剛產的 JSON。continue-on-error 比照 fail-safe 慣例：失敗不 abort
      # job，pipeline.html 維持上週版本（build 只在成功結尾寫檔）。
      - name: Pipeline overview page (漏斗總覽)
        run: python scripts/build_pipeline_page.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dd-screener/pre_id_scan.json \
                  docs/dd-screener/cyclical-track.html \
                  docs/dd-screener/cyclical-track.json \
                  docs/dd-screener/cyclical-track-snapshots/ \
                  docs/dd-screener/_pipeline_body.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(TZ=Asia/Taipei date +"%Y-%m-%d")
            git commit -m "data: Weekly fundamental refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3 4 5 6; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
              sleep $((RANDOM % 20 + 5))
            done
            echo "Push failed after 6 attempts"
            exit 1
          fi
