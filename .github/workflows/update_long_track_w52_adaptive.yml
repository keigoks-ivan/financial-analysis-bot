name: "Update W52 × Adaptive Vol-Target Signal (US+TW)"

on:
  schedule:
    # Two runs per weekday: TW close (11:30 UTC + buffer) and US close
    # (16:00 ET + buffer, 21:35 UTC). The adaptive vol-target sleeve reads off
    # daily realized vol, so it updates every trading day; the weekly W52
    # long-track gate only flips on Fridays. Forward OOS paper tracking.
    - cron: '30 11 * * 1-5'
    - cron: '35 21 * * 1-5'
  workflow_dispatch:  # Manual trigger anytime
    inputs:
      test_email:
        description: 'Send a test email even without an actionable change'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run W52 × adaptive vol-target update
        run: python scripts/update_long_track_w52_adaptive.py

      - name: Run W52 × adaptive cap 1.0 shadow control page
        # cap 1.0 (100%) shadow control page (docs/long-track-w52-adaptive/leverage.html).
        # Since 2026-07-18 main/shadow swap: LIVE main is now cap 1.5 (index.html);
        # this script writes the cap 1.0 shadow. Same two-cron schedule; NO email of its
        # own — notifications are covered by the cap 1.5 main system (alert file below).
        run: python scripts/update_long_track_w52_adaptive_leverage.py

      - name: Read change alert
        id: alert
        run: |
          if [ -f lt_w52a_alert.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat lt_w52a_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # Fail-safe: probe SMTP secret presence via env (the `secrets` context is
      # not reliable inside `if:`), then gate the email step on the result so a
      # missing secret never fails the workflow. The MAIL_USERNAME /
      # MAIL_APP_PASSWORD pair is already configured (shared with
      # update_long_track_smh.yml and 6 other workflows) — no user action needed.
      - name: Check mail secrets
        id: mailcfg
        env:
          MU: ${{ secrets.MAIL_USERNAME }}
          MP: ${{ secrets.MAIL_APP_PASSWORD }}
        run: |
          if [ -n "$MU" ] && [ -n "$MP" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false (SMTP secrets missing — email skipped)" >&2
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email actionable change
        if: (steps.alert.outputs.changed == 'true' || inputs.test_email == true) && steps.mailcfg.outputs.ready == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "⚡ W52×自適應波動率 150%（美+台・實單）可行動變化 ${{ steps.alert.outputs.changed == 'true' && '' || '(測試信)' }}"
          to: keigoks@gmail.com
          from: InvestMQuest Signals <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.alert.outputs.changed == 'true' && steps.alert.outputs.body || '這是測試信 — email 推播管線正常。目前無可行動變化。' }}

            —
            InvestMQuest · W52 × 自適應波動率 150%（美+台）實單主系統
            每交易日台股/美股收盤後自動檢查 · 可行動變化＝任一腿閘門翻轉或最終權重與現持差 ≥ 10pp
            退訂：移除 repo secret MAIL_APP_PASSWORD 或編輯 update_long_track_w52_adaptive.yml

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/long-track-w52-adaptive/index.html docs/long-track-w52-adaptive/state.json docs/long-track-w52-adaptive/leverage.html docs/long-track-w52-adaptive/leverage_state.json
          git diff --staged --quiet || git commit -m "Auto update W52 × adaptive vol-target (US+TW): $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
