name: Manual JP Fundamentals

# 手動觸發 only — fundamentals 一季變一次,不需要排 cron
# 在 GitHub Actions UI 按 "Run workflow" 才跑
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-jp-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run JP fundamentals fetcher
        run: python scripts/fundamentals_jp.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screener/jp_fundamentals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: JP fundamentals refresh ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            for i in 1 2 3 4 5 6; do
              if git push; then
                exit 0
              fi
              echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
              git pull --rebase --autostash origin main || { echo "Rebase failed"; exit 1; }
              sleep $((RANDOM % 20 + 5))
            done
            echo "Push failed after 6 attempts"
            exit 1
          fi
