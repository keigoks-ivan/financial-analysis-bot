name: Daily Alpha Momentum (angles 2 & 5)

on:
  schedule:
    # Mon-Fri 22:30 UTC = Tue-Sat 06:30 Taiwan time
    # Runs 30 min after daily-screener-us so docs/screener/latest.json is fresh.
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rank:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run alpha ranker — momentum layer
        run: python scripts/dd_alpha_ranker.py --layers momentum

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/dd-screener/alpha-rank.html docs/dd-screener/alpha-rank.json docs/dd-screener/alpha-rank-state/momentum.json docs/dd-screener/alpha-rank-snapshots/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "data: alpha-rank momentum layer ${DATE}

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
          fi
