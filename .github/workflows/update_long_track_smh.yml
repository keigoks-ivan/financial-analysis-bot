name: Update Long Track SMH/QQQ Signal

on:
  # 2026-07-23 FROZEN: STX50 (SMH/QQQ) retired — replaced as the live system by
  # W52×adaptive vol-target (2026-07-18). Cron REMOVED (no more scheduled updates);
  # kept as workflow_dispatch only for occasional manual regeneration. Page carries
  # a frozen banner and links to the tracking hub. Residual email/alert step removed.
  workflow_dispatch:  # Manual trigger only (frozen system)

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run long-track SMH/QQQ update
        run: python scripts/update_long_track_smh.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/long-track-smh/index.html docs/long-track-smh/state.json
          git diff --staged --quiet || git commit -m "Auto update long-track SMH/QQQ: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
