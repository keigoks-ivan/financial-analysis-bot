name: Update Long Track SMH/QQQ Signal

on:
  schedule:
    # Every Friday 21:30 UTC (US market close 16:00 ET + 1.5h buffer)
    # = Saturday 05:30 Taiwan time. STX50 signals are weekly (W40/W52/ST) +
    # monthly (TSMOM month-end), so the Friday close is the only meaningful update.
    - cron: '30 21 * * 5'
  workflow_dispatch:  # Manual trigger anytime
    inputs:
      test_email:
        description: 'Send a test email even without signal changes'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # site_nav.py uses 3.12+ f-string syntax

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run long-track SMH/QQQ update
        run: python scripts/update_long_track_smh.py

      - name: Read change alert
        id: alert
        run: |
          if [ -f lt_smh_alert.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat lt_smh_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email signal change
        if: steps.alert.outputs.changed == 'true' || inputs.test_email == true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "⚡ LT SMH/QQQ 訊號變化 ${{ steps.alert.outputs.changed == 'true' && '' || '(測試信)' }}"
          to: keigoks@gmail.com
          from: InvestMQuest Signals <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.alert.outputs.changed == 'true' && steps.alert.outputs.body || '這是測試信 — email 推播管線正常。本週無訊號變化。' }}

            —
            InvestMQuest · 每週五美股收盤後自動檢查
            退訂: 移除 repo secret MAIL_APP_PASSWORD 或編輯 update_long_track_smh.yml

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/long-track-smh/index.html docs/long-track-smh/state.json
          git diff --staged --quiet || git commit -m "Auto update long-track SMH/QQQ: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
          done
          echo "Push failed after 3 attempts"
          exit 1
