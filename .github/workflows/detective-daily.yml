name: Daily Market Detective

# 市場偵探（docs/detective/data/latest.json）— 純機械、零 LLM。
# 聚合三個既有偵測層成單一警報網：monitor 異常引擎（alerts.json 紅/黃燈）×
# 擁擠交易（crowding latest.json：COT 5 年分位極端／ETF 動能極端／主題擁擠）×
# 資產輪動（rotation radar.json：cross_asset 120d 象限翻轉），scripts/build_detective.py。
#
# 事件驅動：monitor 或 rotation radar 任一 workflow 跑完就重生一次，讓偵探
# 永遠跟著最新資料層。build_detective.py 是 zero-churn 寫入——資料沒動就空
# diff、不 commit，故重複觸發是冪等的。cron 為 fallback。
#
# 有紅燈或今日新增訊號時寫 detective_alert.txt（repo 根、未 commit）供本
# workflow 讀取後 email 推播；無警報則不產檔、不寄信。
on:
  workflow_run:
    workflows: ["Daily Market Monitor", "Daily Asset Rotation Radar (RRG)"]
    types: [completed]
  schedule:
    - cron: '0 1 * * 2-6'
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email even without signal changes'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: detective-daily
  cancel-in-progress: false

jobs:
  detective:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build detective alert network
        run: python scripts/build_detective.py

      - name: Read change alert
        id: alert
        run: |
          if [ -f detective_alert.txt ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<ALERT_EOF"
              cat detective_alert.txt
              echo "ALERT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email detective alert
        if: steps.alert.outputs.changed == 'true' || inputs.test_email == true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_APP_PASSWORD }}
          subject: "🕵️ 市場偵探警報 ${{ steps.alert.outputs.changed == 'true' && '' || '(測試信)' }}"
          to: keigoks@gmail.com
          from: InvestMQuest Signals <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.alert.outputs.changed == 'true' && steps.alert.outputs.body || '這是測試信 — 市場偵探 email 推播管線正常。目前無紅燈或新增訊號。' }}

            —
            InvestMQuest · monitor / rotation radar 更新後自動檢查
            描述器：只陳述事實，非擇時訊號。詳見 https://research.investmquest.com/detective/

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/detective/data/latest.json docs/detective/data/state.json | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/detective/data/latest.json docs/detective/data/state.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "detective: daily alert network refresh ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
