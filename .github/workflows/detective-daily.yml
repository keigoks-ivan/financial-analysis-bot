name: Daily Market Detective

# 市場偵探（docs/detective/data/latest.json）— 純機械、零 LLM。
# 聚合三個既有偵測層成單一警報網：monitor 異常引擎（alerts.json 紅/黃燈）×
# 擁擠交易（crowding latest.json：COT 5 年分位極端／ETF 動能極端／主題擁擠）×
# 資產輪動（rotation radar.json：cross_asset 120d 象限翻轉），scripts/build_detective.py。
# 狀態機（scripts/detective_state.py）把每條訊號的跨日生命週期記在
# docs/detective/data/state.json（含 notify 帳）。
#
# Phase 4：統一通知模組（scripts/notify_render.py）把 build 端的機械帳消費成
# 三級 email——immediate（新紅燈／escalated 至紅／composite 新 fire 紅，7 日
# 最小間隔＋mute 節流）／digest（平日彙總）／weekly（週六恆產），寄送層走
# composite action .github/actions/send-notify/。
#
# 事件驅動：monitor 或 rotation radar 任一 workflow 跑完就重生一次。
# cron 平日（週二～週六台灣時間清晨）為 fallback＋寄 digest；
# cron 週六另一班次為週報班次。build_detective.py 是 zero-churn 寫入——資料
# 沒動就空 diff、不 commit，故重複觸發是冪等的。
on:
  workflow_run:
    workflows: ["Daily Market Monitor", "Daily Asset Rotation Radar (RRG)"]
    types: [completed]
  schedule:
    # 2026-07-18 維持獨立（未併入時段帶 B）：本 workflow 帶 workflow_run 事件驅動
    # ＋兩班次＋三級 email tier 與 schedule 深度耦合，併入風險高。平日 cron 由
    # 01:00 錯開到 01:30 UTC，避開時段帶 B（daily-taipei-morning，01:00 UTC）的
    # 同時起跑與 concurrent-push 競態。週六週報班次不變。
    - cron: '30 1 * * 2-6'   # 平日 fallback + digest 班次（原 01:00，錯峰後 01:30）
    - cron: '0 2 * * 6'      # 週六週報班次
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Send a test email even without signal changes (all three tiers, forced)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: detective-daily
  cancel-in-progress: false

jobs:
  detective:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build detective alert network
        run: python scripts/build_detective.py

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event.inputs.test_email }}" == "true" ]; then
            echo "force=true" >> "$GITHUB_OUTPUT"
          else
            echo "force=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" == "schedule" ] && [ "${{ github.event.schedule }}" == "0 2 * * 6" ]; then
            echo "weekly_cron=true" >> "$GITHUB_OUTPUT"
          else
            echo "weekly_cron=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" == "schedule" ] && [ "${{ github.event.schedule }}" != "0 2 * * 6" ]; then
            echo "weekday_cron=true" >> "$GITHUB_OUTPUT"
          else
            echo "weekday_cron=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render immediate tier
        run: |
          if [ "${{ steps.mode.outputs.force }}" == "true" ]; then
            python scripts/notify_render.py --tier immediate --force
          else
            python scripts/notify_render.py --tier immediate
          fi

      - name: Render digest tier
        if: steps.mode.outputs.weekday_cron == 'true' || steps.mode.outputs.force == 'true'
        run: |
          if [ "${{ steps.mode.outputs.force }}" == "true" ]; then
            python scripts/notify_render.py --tier digest --force
          else
            python scripts/notify_render.py --tier digest
          fi

      - name: Render weekly tier
        if: steps.mode.outputs.weekly_cron == 'true' || steps.mode.outputs.force == 'true'
        run: python scripts/notify_render.py --tier weekly

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/detective/data/latest.json docs/detective/data/state.json docs/detective/data/alert_history.json | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/detective/data/latest.json docs/detective/data/state.json docs/detective/data/alert_history.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "detective: daily alert network refresh ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1

      - name: Send immediate notification
        if: ${{ always() && hashFiles('detective_mail_immediate.txt') != '' }}
        uses: ./.github/actions/send-notify
        with:
          subject: "🕵️ 市場偵探 · 即時警報 ${{ steps.mode.outputs.force == 'true' && '【測試】' || '' }}"
          body_file: detective_mail_immediate.txt
          tier: immediate
          mail_username: ${{ secrets.MAIL_USERNAME }}
          mail_password: ${{ secrets.MAIL_APP_PASSWORD }}

      - name: Send digest notification
        if: ${{ always() && hashFiles('detective_mail_digest.txt') != '' }}
        uses: ./.github/actions/send-notify
        with:
          subject: "🕵️ 市場偵探 · 每日摘要 ${{ steps.mode.outputs.force == 'true' && '【測試】' || '' }}"
          body_file: detective_mail_digest.txt
          tier: digest
          mail_username: ${{ secrets.MAIL_USERNAME }}
          mail_password: ${{ secrets.MAIL_APP_PASSWORD }}

      - name: Send weekly notification
        if: ${{ always() && hashFiles('detective_mail_weekly.txt') != '' }}
        uses: ./.github/actions/send-notify
        with:
          subject: "🕵️ 市場偵探 · 週報 ${{ steps.mode.outputs.force == 'true' && '【測試】' || '' }}"
          body_file: detective_mail_weekly.txt
          tier: weekly
          mail_username: ${{ secrets.MAIL_USERNAME }}
          mail_password: ${{ secrets.MAIL_APP_PASSWORD }}
