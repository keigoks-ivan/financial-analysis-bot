name: Weekly Market Data Update

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run market data updater
        id: updater
        run: python scripts/update_markets.py

      - name: Commit and push if changed
        if: steps.updater.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/markets.html docs/sectors.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: weekly market update ${DATE}"
          git push
