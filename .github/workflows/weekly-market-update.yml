name: Weekly Market Data Update

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-markets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" requests

      - name: Run market data updater
        id: updater
        run: python scripts/update_markets.py

      - name: Build risk on/off gauge
        run: python scripts/build_risk_gauge.py

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/markets.html docs/sectors.html docs/cache/risk_gauge.json docs/cache/risk_history.json | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/markets.html docs/sectors.html docs/cache/risk_gauge.json docs/cache/risk_history.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: weekly market update ${DATE}"
          for i in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
          done
          echo "Push failed after 3 attempts"
          exit 1
