name: Update Six-State Machine Status

on:
  # 2026-07-07 六態機已退役（2026-07-04 拍板），排程停用；保留手動觸發可逆。
  # 原排程：cron '46 21 * * 5'（每週五 21:46 UTC）
  workflow_dispatch:  # Manual trigger anytime

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas numpy

      - name: Run six-state update
        run: python scripts/update_six_state.py

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/backtest/six_state/status/index.html docs/six-state/state.json
          git diff --staged --quiet || git commit -m "Auto update six-state: $(date -u '+%Y-%m-%d')"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
