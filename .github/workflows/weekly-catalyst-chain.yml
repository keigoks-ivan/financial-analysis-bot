name: Weekly Catalyst Calendar Chain

on:
  schedule:
    - cron: "0 2 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  catalyst-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" requests

      - name: Build catalyst calendar data
        run: python scripts/build_catalyst_calendar.py

      # Phase 3: variance vs underwriting — produces docs/catalyst/variance.json,
      # BEFORE the page render step below (the page reads variance.json if present).
      - name: Build variance tracker data
        run: python3 scripts/build_variance_tracker.py

      - name: Render catalyst calendar page
        run: python scripts/build_catalyst_page.py

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/catalyst/ | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/catalyst/
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: catalyst calendar weekly refresh ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
