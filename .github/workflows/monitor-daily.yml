name: Daily Market Monitor

# Daily refresh of the market monitor (docs/monitor/data/latest.json + alerts.json):
# ~80 cross-asset series (global indices / US sectors / factors / rates curve /
# vol / credit / FX / commodities / crypto / FRED liquidity) with the anomaly
# engine (z-score gates, percentile gates, structural events) built in
# scripts/build_monitor.py.
#
# yfinance daily bars settle after the US close (~20:00-21:00 UTC), so we run at
# 23:30 UTC on Mon-Fri (cron dow 1-5) = 07:30 Taiwan time Tue-Sat.  Capturing at
# 23:30 UTC of each US trading day means every session Mon-Fri gets its own
# snapshot (the prior 22:52 UTC Tue-Sat schedule systematically skipped Monday's
# US session).  Zero-churn write means a run with no new settled bar (US holiday)
# produces an empty diff and no commit, so this is idempotent.
on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-daily
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" pandas requests

      - name: Build monitor data
        run: python scripts/build_monitor.py

      - name: Commit and push if changed
        run: |
          PATHS=""
          for p in \
            docs/monitor/data/latest.json \
            docs/monitor/data/alerts.json; do
            [ -e "$p" ] && PATHS="$PATHS $p"
          done
          if git status --porcelain $PATHS | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $PATHS
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "monitor: daily data refresh ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
