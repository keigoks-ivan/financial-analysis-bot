name: Daily Risk Gauge Update

# 市場風險儀表（六訊號 Risk-On/Off）每日刷新。
# 2026-07-18 由每週六（weekly-market-update.yml）改為每日：
#   - 儀表現值用日線收盤計算（SPX/VIX/HYG/銅金/XLY-XLP/AUDJPY），日更才有意義
#   - 首頁圖表為 W-FRI 週頻，日更時當週進行中的 bar 會滾動更新（無 look-ahead）
#   - build_risk_gauge.py 冪等：risk_gauge.json history 依日期去重，重跑安全
# weekly-market-update.yml 週六仍會跑同一支腳本（備援，重複無害）。
#
# 排程 Tue-Sat 01:10 UTC（美股收盤 21:00 UTC + 4hr settle）＝台北 09:10，
# 與 daily-non-fundamental-refresh / detective-daily（01:00 UTC）錯開 10 分鐘
# 降低 concurrent-push 競態。

on:
  schedule:
    - cron: "10 1 * * 2-6"  # Tue-Sat 01:10 UTC = Tue-Sat 09:10 Taipei
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-risk-gauge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.40" requests pandas numpy

      - name: Build risk on/off gauge
        run: python scripts/build_risk_gauge.py

      - name: Commit and push if changed
        run: |
          if git status --porcelain docs/markets.html docs/cache/risk_gauge.json docs/cache/risk_history.json | grep -q .; then
            echo "Changes detected"
          else
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/markets.html docs/cache/risk_gauge.json docs/cache/risk_history.json
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: daily risk gauge update ${DATE}"
          for i in 1 2 3 4 5 6; do
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed (likely concurrent push); rebasing onto origin/main..."
            git pull --rebase origin main || { echo "Rebase failed"; exit 1; }
            sleep $((RANDOM % 20 + 5))
          done
          echo "Push failed after 6 attempts"
          exit 1
