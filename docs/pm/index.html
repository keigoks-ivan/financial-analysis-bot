<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PM 週度複盤｜投資研究</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background:#F8FAFC; color:#0F172A; margin:0; padding:24px; font-size:14px; line-height:1.6; }
.container { max-width:960px; margin:0 auto; }
h1 { color:#1E3A5F; border-bottom:4px solid #3B82F6; padding-bottom:10px; font-size:24px; }
h3 { color:#1E3A5F; margin-top:20px; }
a { color:#1E3A5F; text-decoration:none; font-weight:500; }
a:hover { text-decoration:underline; }
.card { background:#fff; padding:16px 20px; border:1px solid #e2e8f0; border-radius:4px; margin:12px 0; }
.muted { color:#64748b; font-size:13px; }
table { width:100%; border-collapse:collapse; margin:12px 0; font-size:13px; }
th { background:#1E3A5F; color:#fff; padding:8px; text-align:left; }
td { padding:8px; border-bottom:1px solid #E2E8F0; }
tr:nth-child(even) td { background:#F1F5F9; }
.badge { display:inline-block; padding:2px 8px; border-radius:3px; font-size:11px; }
.badge-proposal { background:#FEF9C3; color:#92400E; }
.badge-review { background:#DCFCE7; color:#166534; }
</style>
</head>
<body>
<div class="container">
<h1>🏛 PM 週度複盤</h1>
<p class="muted">每週六 09:00 Asia/Taipei 自動執行 · Core ≤ 5 + Satellite ≤ 3 + Cash ≥ 5% · 依 bottom-up 選股決定現金水位</p>

<div class="card">
<h3>最新複盤</h3>
<table id="reports-table">
<thead><tr><th>日期</th><th>模式</th><th>核心</th><th>衛星</th><th>報告</th><th>備註</th></tr></thead>
<tbody id="reports-body">
<tr><td colspan="6" class="muted">載入中…</td></tr>
</tbody>
</table>
</div>

<div class="card">
<h3>相關連結</h3>
<ul>
<li><a href="/research/">深度研究首頁（DD 列表 + 本週複盤）</a></li>
<li><a href="/">回首頁</a></li>
</ul>
</div>

<p class="muted" style="margin-top:30px">PM Skill v1.0 · 分析師 / 基金經理人分工架構</p>
</div>

<script>
// 從 INDEX.md 動態建列表
fetch('INDEX.md').then(r => r.text()).then(text => {
  const tbody = document.getElementById('reports-body');
  const rows = text.split('\n').filter(l => l.startsWith('| 20'));
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="muted">尚未產出首份複盤</td></tr>';
    return;
  }
  tbody.innerHTML = rows.reverse().map(line => {
    const cols = line.split('|').map(c => c.trim()).filter(Boolean);
    if (cols.length < 6) return '';
    const [date, mode, core, sat, file, note] = cols;
    const badge = mode === 'proposal'
      ? '<span class="badge badge-proposal">提案</span>'
      : '<span class="badge badge-review">複盤</span>';
    return `<tr><td>${date}</td><td>${badge}</td><td>${core}</td><td>${sat}</td><td><a href="${file}">查看→</a></td><td class="muted">${note}</td></tr>`;
  }).join('');
});
</script>
</body>
</html>
