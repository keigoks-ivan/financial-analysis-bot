# PM Skill 輸入範例
# 使用方式：把此檔複製為 config.yaml 後修改，或直接在對話中貼給 Claude

portfolio:
  base_currency: USD
  total_nav: 1000000
  as_of_date: 2026-04-18

  # 當前持倉
  holdings:
    - ticker: NVDA
      cost_basis: 120.50
      current_pct: 18.0        # 目前佔組合 %
      entry_date: 2025-11-15
      tier: core               # core / satellite
      notes: "建倉於 GTC 前"

    - ticker: MSFT
      cost_basis: 380.00
      current_pct: 15.5
      entry_date: 2025-09-01
      tier: core

    - ticker: GOOGL
      cost_basis: 165.00
      current_pct: 14.0
      entry_date: 2025-10-10
      tier: core

    - ticker: LLY
      cost_basis: 720.00
      current_pct: 12.0
      entry_date: 2026-01-15
      tier: core

    - ticker: COHR
      cost_basis: 95.00
      current_pct: 6.0
      entry_date: 2026-02-20
      tier: satellite

    - ticker: UBER
      cost_basis: 88.50
      current_pct: 5.5
      entry_date: 2026-03-05
      tier: satellite

benchmark: SPX                 # SPX / QQQ / TAIEX
risk_appetite: moderate        # conservative / moderate / aggressive

# 強制納入候選池（即使 INDEX.md 沒有或排名不高）
watchlist:
  - LITE
  - AMAT

# Override 政策（預設值）
override_policy:
  allow_l1_sizing: true
  allow_l2_horizon: true
  allow_l3_information: true
  allow_l4_thesis: false

# 類別 / 主題上限（可選；不設代表不限制）
sector_caps:
  semiconductor: 50
  software: 35
  healthcare: 25

theme_caps:
  ai_infrastructure: 65
  obesity_drug: 20

# 本次複盤指示（可選；影響優先序）
pm_directive:
  focus: rebalance             # rebalance / defensive / opportunistic
  comments: "想減少半導體集中度，考慮加碼 healthcare"
